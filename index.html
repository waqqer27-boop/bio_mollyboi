<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .header {
      position: relative;
      width: 100%;
      height: 220px;
      overflow: hidden;
    }

    .header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .blur {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 80px;
      backdrop-filter: blur(10px);
      background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.9));
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
      animation: fadeIn 1.5s ease;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 300px;
      align-items: center;
    }

    a {
      text-decoration: none;
      color: white;
      padding: 12px 0;
      width: 100%;
      text-align: center;
      border: 1px solid #444;
      border-radius: 10px;
      transition: 0.3s;
      font-size: 1.2rem;
      position: relative;
      overflow: hidden;
    }

    a::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: 0.5s;
    }

    a:hover::before {
      left: 100%;
    }

    a:hover {
      transform: scale(1.05);
      border-color: #888;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="your-image.jpg" alt="cover">
    <div class="blur"></div>
  </div>

  <div class="container">
    <div class="links">
      <a href="#">Instagram</a>
      <a href="#">Telegram</a>
      <a href="#">YouTube</a>
      <a href="#">Twitch</a>
      <a href="#">Donate</a>
      <a href="#">TikTok</a>
    </div>
  </div>

</body>
</html>
