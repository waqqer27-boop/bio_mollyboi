
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mollyboi Bio</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    margin-top: 40px;
    font-size: 3rem;
    text-align: center;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 40px;
    width: 100%;
    max-width: 300px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    align-items: center;
  }

  .link-button {
    display: block;
    text-decoration: none;
    color: white;
    padding: 12px 0;
    width: 100%;
    text-align: center;
    border: 1px solid #444;
    border-radius: 10px;
    transition: 0.3s;
    font-size: 1.2rem;
    position: relative;
    overflow: hidden;
  }

  .link-button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: 0.5s;
  }

  .link-button:hover::before {
    left: 100%;
  }

  .link-button:hover {
    transform: scale(1.05);
    border-color: #888;
  }
</style>
</head>
<body>

<h1>mollyboi</h1>

<div class="container">
  <div class="links">
    <a class="link-button" href="https://www.instagram.com/moiiyboi/" target="_blank" rel="noopener noreferrer">Instagram</a>
    <a class="link-button" href="https://www.youtube.com/@molIyboi" target="_blank" rel="noopener noreferrer">YouTube</a>
    <a class="link-button" href="https://www.twitch.tv/moiiyboi" target="_blank" rel="noopener noreferrer">Twitch</a>
    <a class="link-button" href="https://www.donationalerts.com/r/mollyboi" target="_blank" rel="noopener noreferrer">Donate</a>
  </div>
</div>

</body>
</html>
